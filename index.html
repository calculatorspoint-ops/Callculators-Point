<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ═══════════════════════════════════════════════
         RESOURCE HINTS — load critical assets early
    ════════════════════════════════════════════════ -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ═══════════════════════════════════════════════
         FAVICON & THEME
    ════════════════════════════════════════════════ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CalculatorsPoint" />

    <!-- ═══════════════════════════════════════════════
         PRIMARY SEO
    ════════════════════════════════════════════════ -->
    <title>CalculatorsPoint — 55+ Free Online Calculators</title>
    <meta name="description" content="CalculatorsPoint offers 55+ free, instant calculators for finance, health, math, and everyday use. Fast, accurate, and beautifully designed tools — no signup required." />
    <meta name="keywords" content="calculator, EMI calculator, BMI calculator, SIP calculator, compound interest, GST calculator, tax calculator, salary calculator, GPA calculator" />
    <meta name="author" content="CalculatorsPoint" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://calculatorspoint.com/" />

    <!-- ═══════════════════════════════════════════════
         OPEN GRAPH
    ════════════════════════════════════════════════ -->
    <meta property="og:title" content="CalculatorsPoint — 55+ Free Online Calculators" />
    <meta property="og:description" content="Professional-grade calculators for finance, health, math, and everyday use. Fast, free, and beautifully designed." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://calculatorspoint.com/" />
    <meta property="og:site_name" content="CalculatorsPoint" />
    <meta property="og:locale" content="en_US" />

    <!-- ═══════════════════════════════════════════════
         TWITTER CARD
    ════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CalculatorsPoint — 55+ Free Online Calculators" />
    <meta name="twitter:description" content="Professional-grade calculators for finance, health, math, and everyday use." />

    <!-- ═══════════════════════════════════════════════
         CRITICAL INLINE CSS — prevents FOUC + fixes CLS
         IMPORTANT: Reserves explicit height for above-fold
         sections to prevent 0.400 layout shift score.
    ════════════════════════════════════════════════ -->
    <style>
      /* System font stack — matches --font token exactly */
      :root {
        --font:         'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        --font-display: 'Plus Jakarta Sans', 'Inter', sans-serif;
        --font-hd:      'Plus Jakarta Sans', 'Inter', sans-serif;
        --font-mono:    'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
        --nav-h: 62px;
      }
      /* Prevent invisible text during font load (fixes FCP) */
      body { font-family: var(--font); font-display: swap; }
      /* Above-fold background — no white flash */
      html, body { background: #020617; color: #f8fafc; margin: 0; overflow-x: hidden; }

      /* ── CLS FIX: Reserve explicit height for navbar ──
         Without this the navbar pops in and shifts content */
      .navbar {
        height: var(--nav-h);
        min-height: var(--nav-h);
        contain: layout style;
      }

      /* ── CLS FIX: Reserve hero section min-height ──
         Prevents the hero from collapsing then expanding */
      .hero {
        min-height: 380px;
        contain: layout;
      }

      /* ── CLS FIX: Reserve stat strip height ── */
      .stat-strip {
        min-height: 80px;
      }

      /* ── CLS FIX: Prevent font-swap layout shift ──
         size-adjust ensures fallback & web font take same space */
      @font-face {
        font-family: 'Inter';
        font-display: swap;
        src: local('Inter');
        size-adjust: 100%;
      }
      @font-face {
        font-family: 'Plus Jakarta Sans';
        font-display: swap;
        src: local('Plus Jakarta Sans');
        size-adjust: 107%;
      }

      /* Spinner shown while React hydrates */
      #root:empty::after {
        content: '';
        display: block;
        width: 32px; height: 32px;
        margin: 40vh auto 0;
        border: 3px solid rgba(255,255,255,.1);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: _spin .7s linear infinite;
      }
      @keyframes _spin { to { transform: rotate(360deg); } }
    </style>

    <!-- ═══════════════════════════════════════════════
         FONTS — Non-blocking load strategy
         FIX: Was render-blocking. Now uses preload +
         media="print" trick to load asynchronously.
         Plus Jakarta Sans added (used by --font-hd token).
    ════════════════════════════════════════════════ -->
    <!-- Step 1: preload the font CSS so browser fetches it early -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800;900&family=JetBrains+Mono:wght@400;600&display=swap"
    />
    <!-- Step 2: load non-blocking via media=print trick -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800;900&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    </noscript>

    <!-- ═══════════════════════════════════════════════
         JSON-LD STRUCTURED DATA
    ════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CalculatorsPoint",
      "url": "https://calculatorspoint.com/",
      "description": "55+ free professional-grade calculators for finance, health, math, and everyday use.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://calculatorspoint.com/calculators?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <!-- Root mount point -->
    <div id="root"></div>
    <!-- Module script — Vite injects the correct hashed bundle path at build time -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
